# render.yaml - Render Blueprint for MANDIMITRA Backend
# This file auto-configures the service when you connect the repo

services:
  - type: web
    name: mandimitra-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATAGOV_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: Gemini_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health
