<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="leaf" x1="180" y1="120" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="300" x2="350" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Leaf shape - main icon -->
  <path d="M256 100 C180 140, 120 220, 140 320 C155 390, 210 420, 256 430 C302 420, 357 390, 372 320 C392 220, 332 140, 256 100Z" fill="url(#leaf)" opacity="0.95"/>
  <!-- Central vein of leaf -->
  <path d="M256 140 L256 380" stroke="#059669" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- Left veins -->
  <path d="M256 200 Q220 190, 185 220" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 250 Q210 240, 170 275" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 300 Q215 295, 180 330" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Right veins -->
  <path d="M256 200 Q292 190, 327 220" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 250 Q302 240, 342 275" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 300 Q297 295, 332 330" stroke="#059669" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Small price chart bars at bottom-right (market) -->
  <rect x="320" y="350" width="20" height="40" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="348" y="330" width="20" height="60" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="376" y="310" width="20" height="80" rx="4" fill="url(#accent)" opacity="0.9"/>
  <!-- Upward trend arrow -->
  <path d="M325 385 L386 305" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M375 305 L390 305 L390 320" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
</svg>
